workflows:
  android-debug:
    name: Hammer and Bricks - Android (debug, no signing needed)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 20.19.0
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android debug APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - joidehen@mightyunits.com

  android-release:
    name: Hammer and Bricks - Android (release, for Play Store)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 20.19.0
      groups:
        - android_signing
        # Create this group in Codemagic > Team settings > Environment variables
        # with: CM_KEYSTORE, CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android release bundle
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      email:
        recipients:
          - joidehen@mightyunits.com

  ios-release:
    name: Hammer and Bricks - iOS (App Store)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic_appstore_connect
      # Set this up first in Codemagic > Team settings > Integrations,
      # using the reference name you choose there.
    environment:
      node: 20.19.0
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mightyunits.hammerandbricks
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build .ipa
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - joidehen@mightyunits.com
